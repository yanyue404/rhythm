name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows

      - name: Build release
        working-directory: windows
        run: cargo build --release

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package ZIP
        working-directory: windows
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\package_win.ps1 -Version ${{ steps.version.outputs.VERSION }} -SkipBuild

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $issLangDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$issLangDir\ChineseSimplified.isl"
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        run: |
          iscc /DAppVersion="${{ steps.version.outputs.VERSION }}" windows\installer\rhythm-win.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/RhythmWin-v${{ steps.version.outputs.VERSION }}-win64.zip
            dist/RhythmWin-Setup-v${{ steps.version.outputs.VERSION }}.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and package DMG
        working-directory: macos
        run: zsh scripts/package_dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: macos/dist/Rhythm-${{ steps.version.outputs.VERSION }}.dmg

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/RhythmWin-v*-win64.zip
            dist/RhythmWin-Setup-v*.exe
            dist/Rhythm-*.dmg
